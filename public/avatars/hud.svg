<svg viewBox="0 0 300 370" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#0d1f18"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#1a2e24"/>
      <stop offset="100%" stop-color="#0f1a14"/>
    </radialGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2e1f"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="370" fill="url(#bgGlow)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#00ff88" stroke-width="0.5">
    <line x1="0" y1="30" x2="300" y2="30"/>
    <line x1="0" y1="60" x2="300" y2="60"/>
    <line x1="0" y1="90" x2="300" y2="90"/>
    <line x1="0" y1="120" x2="300" y2="120"/>
    <line x1="0" y1="150" x2="300" y2="150"/>
    <line x1="0" y1="180" x2="300" y2="180"/>
    <line x1="0" y1="210" x2="300" y2="210"/>
    <line x1="0" y1="240" x2="300" y2="240"/>
    <line x1="0" y1="270" x2="300" y2="270"/>
    <line x1="0" y1="300" x2="300" y2="300"/>
    <line x1="0" y1="330" x2="300" y2="330"/>
    <line x1="0" y1="360" x2="300" y2="360"/>
    <line x1="30" y1="0" x2="30" y2="370"/>
    <line x1="60" y1="0" x2="60" y2="370"/>
    <line x1="90" y1="0" x2="90" y2="370"/>
    <line x1="120" y1="0" x2="120" y2="370"/>
    <line x1="150" y1="0" x2="150" y2="370"/>
    <line x1="180" y1="0" x2="180" y2="370"/>
    <line x1="210" y1="0" x2="210" y2="370"/>
    <line x1="240" y1="0" x2="240" y2="370"/>
    <line x1="270" y1="0" x2="270" y2="370"/>
  </g>

  <!-- Neural network connections (background) -->
  <g opacity="0.18" stroke="#00ff88" stroke-width="0.8">
    <line x1="30" y1="40" x2="90" y2="80"/>
    <line x1="90" y1="80" x2="150" y2="50"/>
    <line x1="150" y1="50" x2="220" y2="90"/>
    <line x1="220" y1="90" x2="270" y2="55"/>
    <line x1="30" y1="40" x2="60" y2="110"/>
    <line x1="270" y1="55" x2="255" y2="130"/>
    <line x1="60" y1="110" x2="90" y2="80"/>
    <line x1="255" y1="130" x2="220" y2="90"/>
    <line x1="20" y1="160" x2="60" y2="110"/>
    <line x1="280" y1="150" x2="255" y2="130"/>
    <line x1="20" y1="160" x2="50" y2="200"/>
    <line x1="280" y1="150" x2="265" y2="195"/>
  </g>

  <!-- Neural nodes (background) -->
  <g filter="url(#glow)">
    <circle cx="30" cy="40" r="3" fill="#00ff88" opacity="0.5"/>
    <circle cx="90" cy="80" r="2.5" fill="#00ff88" opacity="0.4"/>
    <circle cx="150" cy="50" r="3" fill="#00c9ff" opacity="0.5"/>
    <circle cx="220" cy="90" r="2.5" fill="#00ff88" opacity="0.4"/>
    <circle cx="270" cy="55" r="3" fill="#00c9ff" opacity="0.5"/>
    <circle cx="60" cy="110" r="2" fill="#00ff88" opacity="0.35"/>
    <circle cx="255" cy="130" r="2" fill="#00ff88" opacity="0.35"/>
    <circle cx="20" cy="160" r="2.5" fill="#00c9ff" opacity="0.4"/>
    <circle cx="280" cy="150" r="2.5" fill="#00ff88" opacity="0.4"/>
    <circle cx="50" cy="200" r="2" fill="#00ff88" opacity="0.3"/>
    <circle cx="265" cy="195" r="2" fill="#00c9ff" opacity="0.3"/>
  </g>

  <!-- Body / torso -->
  <path d="M75 310 Q75 255 150 248 Q225 255 225 310 L225 370 L75 370 Z"
        fill="url(#bodyGrad)" opacity="0.9"/>

  <!-- Shirt / collar details -->
  <path d="M120 260 L150 285 L180 260 L175 255 L150 278 L125 255 Z"
        fill="#0a1a12" stroke="#00ff88" stroke-width="0.5" opacity="0.7"/>

  <!-- Circuit lines on torso -->
  <g stroke="#00ff88" stroke-width="0.7" opacity="0.2">
    <line x1="110" y1="290" x2="140" y2="290"/>
    <line x1="140" y1="290" x2="140" y2="310"/>
    <line x1="140" y1="310" x2="160" y2="310"/>
    <line x1="160" y1="310" x2="160" y2="290"/>
    <line x1="160" y1="290" x2="190" y2="290"/>
    <circle cx="140" cy="290" r="2" fill="#00ff88" opacity="0.4"/>
    <circle cx="160" cy="310" r="2" fill="#00ff88" opacity="0.4"/>
  </g>

  <!-- Neck -->
  <rect x="136" y="228" width="28" height="28" rx="4"
        fill="#0f2218" stroke="#1a3626" stroke-width="0.5"/>

  <!-- Head -->
  <ellipse cx="150" cy="170" rx="62" ry="68"
           fill="url(#faceGrad)" stroke="#1e3d2a" stroke-width="1"/>

  <!-- Ear left -->
  <ellipse cx="88" cy="172" rx="8" ry="12"
           fill="#0f2218" stroke="#1e3d2a" stroke-width="0.8"/>

  <!-- Ear right -->
  <ellipse cx="212" cy="172" rx="8" ry="12"
           fill="#0f2218" stroke="#1e3d2a" stroke-width="0.8"/>

  <!-- Ear detail -->
  <ellipse cx="88" cy="172" rx="4" ry="7" fill="#0a1a12" opacity="0.6"/>
  <ellipse cx="212" cy="172" rx="4" ry="7" fill="#0a1a12" opacity="0.6"/>

  <!-- Hair -->
  <path d="M88 148 Q95 105 150 100 Q205 105 212 148 Q205 118 150 115 Q95 118 88 148 Z"
        fill="#050d08"/>

  <!-- Eyebrows -->
  <path d="M118 152 Q128 148 138 151" stroke="#2a4a36" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M162 151 Q172 148 182 152" stroke="#2a4a36" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Eyes - tech style with glow -->
  <g filter="url(#glow)">
    <!-- Left eye -->
    <ellipse cx="128" cy="165" rx="13" ry="10" fill="#050d08" stroke="#00ff88" stroke-width="0.8" opacity="0.9"/>
    <circle cx="128" cy="165" r="6" fill="#001a0d"/>
    <circle cx="128" cy="165" r="4" fill="#00ff88" opacity="0.85"/>
    <circle cx="128" cy="165" r="2" fill="#002a10"/>
    <!-- Left eye glow -->
    <circle cx="128" cy="165" r="4" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.6"/>

    <!-- Right eye -->
    <ellipse cx="172" cy="165" rx="13" ry="10" fill="#050d08" stroke="#00c9ff" stroke-width="0.8" opacity="0.9"/>
    <circle cx="172" cy="165" r="6" fill="#00091a"/>
    <circle cx="172" cy="165" r="4" fill="#00c9ff" opacity="0.85"/>
    <circle cx="172" cy="165" r="2" fill="#000d26"/>
    <!-- Right eye glow -->
    <circle cx="172" cy="165" r="4" fill="none" stroke="#00c9ff" stroke-width="0.5" opacity="0.6"/>
  </g>

  <!-- Eye shine -->
  <circle cx="131" cy="162" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="175" cy="162" r="1.5" fill="white" opacity="0.6"/>

  <!-- Glasses frame -->
  <g stroke="#2a4a3a" stroke-width="1.2" fill="none" opacity="0.7">
    <rect x="113" y="154" width="30" height="22" rx="5" stroke="#00ff88" stroke-width="0.8" opacity="0.4"/>
    <rect x="157" y="154" width="30" height="22" rx="5" stroke="#00c9ff" stroke-width="0.8" opacity="0.4"/>
    <line x1="143" y1="163" x2="157" y2="163"/>
    <line x1="88" y1="163" x2="113" y2="163"/>
    <line x1="187" y1="163" x2="212" y2="163"/>
  </g>

  <!-- Nose -->
  <path d="M147 175 Q143 188 148 193 Q152 195 157 193 Q162 188 153 175"
        stroke="#1a3020" stroke-width="1.2" fill="none" opacity="0.6"/>

  <!-- Mouth - subtle smile -->
  <path d="M135 207 Q150 215 165 207"
        stroke="#1e3a28" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Scan line effect (tech aesthetic) -->
  <rect x="88" y="168" width="124" height="1.5" fill="#00ff88" opacity="0.06"/>

  <!-- Circuit on head / temples -->
  <g stroke="#00ff88" stroke-width="0.6" opacity="0.25">
    <line x1="96" y1="155" x2="108" y2="155"/>
    <line x1="108" y1="155" x2="108" y2="145"/>
    <circle cx="108" cy="145" r="2" fill="#00ff88" opacity="0.5"/>
    <line x1="204" y1="155" x2="192" y2="155"/>
    <line x1="192" y1="155" x2="192" y2="145"/>
    <circle cx="192" cy="145" r="2" fill="#00c9ff" opacity="0.5"/>
  </g>

  <!-- Neural network connections on forehead -->
  <g opacity="0.15" stroke="#00ff88" stroke-width="0.6">
    <line x1="130" y1="118" x2="150" y2="128"/>
    <line x1="150" y1="128" x2="170" y2="118"/>
    <line x1="150" y1="128" x2="150" y2="140"/>
  </g>
  <g filter="url(#glow)" opacity="0.4">
    <circle cx="130" cy="118" r="1.8" fill="#00ff88"/>
    <circle cx="150" cy="128" r="2" fill="#00ff88"/>
    <circle cx="170" cy="118" r="1.8" fill="#00c9ff"/>
  </g>

  <!-- Center glow overlay -->
  <ellipse cx="150" cy="185" rx="80" ry="90" fill="url(#glowCenter)"/>

  <!-- Bottom fade -->
  <rect x="0" y="310" width="300" height="60"
        fill="url(#bgGlow)" opacity="0.5"/>

  <!-- Top scan line -->
  <line x1="0" y1="0" x2="300" y2="0" stroke="#00ff88" stroke-width="1" opacity="0.3"/>

  <!-- HUD corner decorations -->
  <g stroke="#00ff88" stroke-width="1" opacity="0.4">
    <line x1="0" y1="0" x2="20" y2="0"/>
    <line x1="0" y1="0" x2="0" y2="20"/>
    <line x1="300" y1="0" x2="280" y2="0"/>
    <line x1="300" y1="0" x2="300" y2="20"/>
    <line x1="0" y1="370" x2="20" y2="370"/>
    <line x1="0" y1="370" x2="0" y2="350"/>
    <line x1="300" y1="370" x2="280" y2="370"/>
    <line x1="300" y1="370" x2="300" y2="350"/>
  </g>

  <!-- Status text -->
  <text x="10" y="358" font-family="monospace" font-size="7" fill="#00ff88" opacity="0.4">AI_ENGINEER::ACTIVE</text>
  <text x="210" y="358" font-family="monospace" font-size="7" fill="#00c9ff" opacity="0.4">v2.0.26</text>
</svg>

<svg viewBox="0 0 300 370" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <radialGradient id="nn-bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#060d10"/>
      <stop offset="100%" stop-color="#020508"/>
    </radialGradient>
    <radialGradient id="nn-face-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00c9ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00c9ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nn-head-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <filter id="nn-glow-sm">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nn-glow-md">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nn-glow-lg">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="370" fill="url(#nn-bg)"/>

  <!-- Head/face area glow -->
